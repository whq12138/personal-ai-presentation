# ============================================================
# Personal AI Presentation — Full-Stack Docker Compose
# ============================================================
#
# Services:
#   backend   – FastAPI (Python 3.12) + APScheduler
#   frontend  – Next.js 14 (standalone output)
#   postgres  – PostgreSQL 16
#   redis     – Redis 7 (rate limiter + cache)
#
# 启动:  docker compose up -d
# 停止:  docker compose down
# 查看:  docker compose logs -f
# ============================================================

version: "3.9"

services:
  # ═══════════════════════════════════════════════════════
  # PostgreSQL — 主数据库
  # ═══════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: pai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pai_presentation
      POSTGRES_USER: pai_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pai_dev_password_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pai_user -d pai_presentation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # Redis — 限流 + 缓存
  # ═══════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: pai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # Backend — FastAPI
  # ═══════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server
      DEBUG: "false"
      PORT: "8000"
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
      # Database (PostgreSQL via docker network)
      DATABASE_URL: "postgresql+asyncpg://pai_user:${DB_PASSWORD:-pai_dev_password_change_me}@postgres:5432/pai_presentation"
      # JWT
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-to-a-random-64-char-string}"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "60"
      # LLM
      LLM_API_BASE: "${LLM_API_BASE:-https://api.deepseek.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL_NAME: "${LLM_MODEL_NAME:-deepseek-chat}"
      LLM_MAX_TOKENS: "4096"
      LLM_TEMPERATURE: "0.7"
      # Redis
      RATE_LIMIT_BACKEND: "redis"
      REDIS_URL: "redis://redis:6379/0"
      # Payment
      PAYMENT_SANDBOX_MODE: "true"
      PAYMENT_WEBHOOK_SECRET: "${PAYMENT_WEBHOOK_SECRET:-dev-secret-change-me}"
      # Privacy
      AUTO_PURGE_HOURS: "24"
      TASK_CLEANUP_HOURS: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════
  # Frontend — Next.js
  # ═══════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

# ═══════════════════════════════════════════════════════
# 持久化数据卷
# ═══════════════════════════════════════════════════════
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
